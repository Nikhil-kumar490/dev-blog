version: '3.8'
services:
  api:
    build: .
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/devblog
      - JWT_SECRET=devblog_super_secret_key
      - PORT=4000
    depends_on:
      - mongo
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
  client:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./client:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://localhost:4000/api
volumes:
  mongo_data:
